name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
      - name: Install Just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Run tests
        run: just test

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          cache: false
      - name: Install Just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Check formatting
        run: just fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache: false
      - uses: Swatinem/rust-cache@v2
      - name: Install Just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Clippy check
        run: just clippy

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          cache: false
      - uses: Swatinem/rust-cache@v2
      - name: Install Just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Build
        run: just build

  # Full development workflow test
  dev-workflow:
    name: Dev Workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: false
      - uses: Swatinem/rust-cache@v2
      - name: Install Just
        uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Run full dev workflow
        run: just dev